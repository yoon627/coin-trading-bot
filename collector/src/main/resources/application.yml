spring:
  application:
    name: market-data-collector
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

collector:
  upbit:
    enabled: true
    markets: KRW-BTC,KRW-ETH,KRW-XRP,KRW-SOL
  binance:
    enabled: true
    markets: BTCUSDT,ETHUSDT,XRPUSDT,SOLUSDT

logging:
  level:
    com.trading.collector: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
