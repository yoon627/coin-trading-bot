server:
  port: 8081

spring:
  application:
    name: market-data-collector
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

collector:
  upbit:
    enabled: true
    markets: KRW-BTC,KRW-ETH,KRW-XRP,KRW-SOL
  binance:
    enabled: true
    markets: BTCUSDT,ETHUSDT,XRPUSDT,SOLUSDT
  kis:
    enabled: ${COLLECTOR_KIS_ENABLED:false}
    markets: ${COLLECTOR_KIS_MARKETS:AAPL,MSFT,GOOGL,AMZN,TSLA,NVDA,META}
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}

logging:
  level:
    com.trading.collector: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
