name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test --parallel

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push collector image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: collector/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-collector:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-collector:${{ github.sha }}

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/key.pem
          chmod 600 /tmp/key.pem

          ssh -o StrictHostKeyChecking=no -i /tmp/key.pem ec2-user@$EC2_HOST \
            "mkdir -p /opt/app && rm -rf /opt/app/monitoring"

          scp -o StrictHostKeyChecking=no -i /tmp/key.pem \
            docker-compose.yml ec2-user@$EC2_HOST:/opt/app/docker-compose.yml

          scp -o StrictHostKeyChecking=no -i /tmp/key.pem \
            -r monitoring ec2-user@$EC2_HOST:/opt/app/

          ssh -o StrictHostKeyChecking=no -i /tmp/key.pem ec2-user@$EC2_HOST bash <<'EOF'
          cd /opt/app

          # Login to GHCR and pull latest images
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose pull app collector

          # Rolling restart: bring up new containers
          docker compose up -d --remove-orphans

          # Wait for health check
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "App is healthy!"
              break
            fi
            sleep 5
          done

          # Cleanup old images
          docker image prune -f
          EOF

          rm -f /tmp/key.pem
