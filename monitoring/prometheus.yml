global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'coin-trading-bot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']

  - job_name: 'market-data-collector'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['collector:8081']
