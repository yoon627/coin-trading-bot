services:
  app:
    image: ghcr.io/yoon627/coin-trading-bot:${APP_VERSION:-latest}
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      UPBIT_ACCESS_KEY: ${UPBIT_ACCESS_KEY:-}
      UPBIT_SECRET_KEY: ${UPBIT_SECRET_KEY:-}
      TRADING_TICKERS: ${TRADING_TICKERS:-KRW-BTC}
      TRADING_STRATEGY: ${TRADING_STRATEGY:-combined}
      TRADING_AUTO_START: ${TRADING_AUTO_START:-false}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_ERROR_ALERT_ENABLED: ${DISCORD_ERROR_ALERT_ENABLED:-false}
      DISCORD_ERROR_WEBHOOK_URL: ${DISCORD_ERROR_WEBHOOK_URL:-}
      REDIS_HOST: redis
      REDIS_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: trading
      DB_USER: trading
      DB_PASSWORD: ${DB_PASSWORD:-trading}
      JWT_SECRET: ${JWT_SECRET:-}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
