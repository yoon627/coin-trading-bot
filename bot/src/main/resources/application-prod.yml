spring:
  autoconfigure:
    exclude: []
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trading}?sslMode=${DB_SSL_MODE:disable}
    username: ${DB_USER:trading}
    password: ${DB_PASSWORD:trading}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trading}?sslmode=${DB_SSL_MODE:disable}
    user: ${DB_USER:trading}
    password: ${DB_PASSWORD:trading}

redis:
  enabled: ${REDIS_ENABLED:false}

app:
  jwt-secret: ${JWT_SECRET:}
  encryption-secret: ${APP_ENCRYPTION_SECRET:}

logging:
  level:
    com.trading.bot: INFO
