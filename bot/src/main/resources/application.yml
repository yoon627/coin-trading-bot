spring:
  application:
    name: coin-trading-bot
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:trading}
    username: ${DB_USER:trading}
    password: ${DB_PASSWORD:trading}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: trading-bot
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:trading}
    user: ${DB_USER:trading}
    password: ${DB_PASSWORD:trading}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

upbit:
  access-key: ${UPBIT_ACCESS_KEY:}
  secret-key: ${UPBIT_SECRET_KEY:}
  base-url: https://api.upbit.com

trading:
  tickers: ${TRADING_TICKERS:KRW-BTC}
  strategy: ${TRADING_STRATEGY:volatility_breakout}
  invest-ratio: ${TRADING_INVEST_RATIO:0.1}
  max-invest-amount: ${TRADING_MAX_INVEST_AMOUNT:100000}
  k-value: ${TRADING_K_VALUE:0.5}
  take-profit-pct: ${TRADING_TAKE_PROFIT_PCT:2.0}
  max-loss-pct: ${TRADING_MAX_LOSS_PCT:5.0}
  interval-seconds: ${TRADING_INTERVAL_SECONDS:10}
  auto-start: ${TRADING_AUTO_START:false}

app:
  jwt-secret: ${JWT_SECRET:}
  jwt-expiration-ms: 86400000
  encryption-secret: ${APP_ENCRYPTION_SECRET:}

watchlist:
  tickers: ${WATCHLIST_TICKERS:KRW-BTC,KRW-ETH,KRW-XRP,KRW-SOL,KRW-DOGE,KRW-ADA,KRW-AVAX,KRW-LINK,KRW-DOT,KRW-SHIB,KRW-NEAR,KRW-SUI,KRW-HBAR}

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

logging:
  level:
    com.trading.bot: DEBUG
