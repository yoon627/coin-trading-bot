<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tide — 로그인</title>
<link rel="stylesheet" href="tide-app/tokens.css"/>
<style>
  body { background: var(--bg-soft); }
  .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .login-card { width: 100%; max-width: 400px; background: #fff; border: 1px solid var(--ink-200); border-radius: 20px; padding: 40px 32px; }
  .login-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tide-app/api.js"></script>

<script type="text/babel">
function TideLogo() {
  return (
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
      <path d="M2 14 Q 5 10, 8 14 T 14 14 T 20 14 T 23 14" stroke="#00A6B6" strokeWidth="2.4" strokeLinecap="round"/>
      <path d="M2 18 Q 5 15.5, 8 18 T 14 18 T 20 18 T 23 18" stroke="#00A6B6" strokeWidth="2.4" strokeLinecap="round" opacity="0.45"/>
    </svg>
  );
}

function Auth() {
  const [mode, setMode] = React.useState('login');
  const [username, setUsername] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [accessKey, setAccessKey] = React.useState('');
  const [secretKey, setSecretKey] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(null);
    try {
      if (mode === 'login') {
        await TideAPI.login(username, password);
      } else {
        await TideAPI.register(username, password, accessKey || undefined, secretKey || undefined);
        await TideAPI.login(username, password);
      }
      location.href = '/app.html';
    } catch (e) {
      setErr(e.message || '오류가 발생했습니다');
    } finally { setBusy(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <TideLogo/>
          <div style={{ fontSize: 22, fontWeight: 700, marginTop: 12, letterSpacing: '-0.03em' }}>Tide</div>
          <div style={{ fontSize: 13, color: 'var(--ink-500)', marginTop: 4 }}>흐름을 읽는 자동매매</div>
        </div>

        <div style={{ display: 'flex', gap: 4, padding: 4, background: 'var(--ink-100)', borderRadius: 10, marginBottom: 24 }}>
          <div className="login-tab" style={{ background: mode === 'login' ? '#fff' : 'transparent', color: mode === 'login' ? 'var(--ink-900)' : 'var(--ink-500)' }} onClick={() => setMode('login')}>로그인</div>
          <div className="login-tab" style={{ background: mode === 'register' ? '#fff' : 'transparent', color: mode === 'register' ? 'var(--ink-900)' : 'var(--ink-500)' }} onClick={() => setMode('register')}>회원가입</div>
        </div>

        <form onSubmit={submit}>
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-700)', marginBottom: 6 }}>아이디</div>
            <input className="tide-input" value={username} onChange={e => setUsername(e.target.value)} required autoComplete="username"/>
          </div>
          <div style={{ marginBottom: mode === 'register' ? 12 : 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-700)', marginBottom: 6 }}>비밀번호</div>
            <input className="tide-input" type="password" value={password} onChange={e => setPassword(e.target.value)} required autoComplete={mode === 'login' ? 'current-password' : 'new-password'}/>
          </div>

          {mode === 'register' && <>
            <div style={{ fontSize: 11, color: 'var(--ink-500)', marginBottom: 8, padding: '8px 0', borderTop: '1px solid var(--ink-100)', marginTop: 8 }}>Upbit API 키 (나중에 설정에서 추가 가능)</div>
            <div style={{ marginBottom: 10 }}>
              <input className="tide-input mono" value={accessKey} onChange={e => setAccessKey(e.target.value)} placeholder="Access Key (선택)"/>
            </div>
            <div style={{ marginBottom: 20 }}>
              <input className="tide-input mono" type="password" value={secretKey} onChange={e => setSecretKey(e.target.value)} placeholder="Secret Key (선택)"/>
            </div>
          </>}

          {err && <div style={{ padding: 12, background: 'var(--up-soft)', color: 'var(--up)', borderRadius: 8, fontSize: 12, marginBottom: 12 }}>{err}</div>}

          <button type="submit" disabled={busy} style={{
            width: '100%', height: 52, background: 'var(--tide-primary)', color: '#fff',
            border: 'none', borderRadius: 12, fontSize: 15, fontWeight: 700, cursor: busy ? 'wait' : 'pointer',
            fontFamily: 'inherit', letterSpacing: '-0.01em',
          }}>{busy ? '처리 중…' : (mode === 'login' ? '로그인' : '계정 만들기')}</button>
        </form>

        <div style={{ marginTop: 20, padding: 12, background: 'var(--tide-primary-soft)', borderRadius: 10, fontSize: 11, color: 'var(--tide-primary-ink)', lineHeight: 1.5 }}>
          🛡 모든 API 키는 AES-GCM으로 암호화 저장됩니다. <strong>출금 권한은 절대 부여하지 마세요.</strong>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Auth/>);
</script>
</body>
</html>
