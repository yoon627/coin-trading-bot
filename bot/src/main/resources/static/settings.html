<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Coin Trading Bot</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .settings-page { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .settings-page h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
        .settings-page .card { margin-bottom: 1.5rem; }
        .form-row { margin-bottom: 1rem; }
        .form-row label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .form-row input[type="text"], .form-row input[type="password"] {
            width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem;
        }
        .form-row input:focus { outline: 2px solid var(--accent); border-color: transparent; }
        .check-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        .check-row label { font-size: 0.9rem; color: var(--text); margin: 0; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 0.875rem; }
        .back-link:hover { text-decoration: underline; }
        .btn-save { width: 100%; padding: 0.65rem; margin-top: 0.5rem; }
        .saved-msg { color: var(--green); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>
    <div class="settings-page">
        <a href="/" class="back-link">&larr; Back to Dashboard</a>
        <h1>Settings</h1>

        <div class="card">
            <h2>Profile</h2>
            <div class="check-row">
                <input type="checkbox" id="chk-public-profile">
                <label for="chk-public-profile">Public Profile (리더보드에 표시)</label>
            </div>
            <div class="check-row">
                <input type="checkbox" id="chk-public-strategy">
                <label for="chk-public-strategy">Public Strategy (전략 공개)</label>
            </div>
        </div>

        <div class="card">
            <h2>Discord Webhook</h2>
            <div class="form-row">
                <label for="input-discord">Webhook URL (매매 알림 수신)</label>
                <input type="text" id="input-discord" placeholder="https://discord.com/api/webhooks/...">
            </div>
        </div>

        <div class="card">
            <h2>Upbit API Keys</h2>
            <div class="form-row">
                <label for="input-access-key">Access Key</label>
                <input type="text" id="input-access-key" placeholder="Access Key">
            </div>
            <div class="form-row">
                <label for="input-secret-key">Secret Key</label>
                <input type="password" id="input-secret-key" placeholder="Secret Key">
            </div>
            <p style="font-size:0.75rem; color:var(--text-muted);">비어있으면 기존 키를 유지합니다.</p>
        </div>

        <button class="btn btn-secondary btn-save" onclick="saveAll()">Save Settings</button>
        <p id="saved-msg" class="saved-msg">Settings saved!</p>
    </div>

    <script>
        function authHeaders() {
            return { 'Content-Type': 'application/json' };
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/user/me', { headers: authHeaders() });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const me = await res.json();
                document.getElementById('chk-public-profile').checked = me.public_profile || false;
                document.getElementById('chk-public-strategy').checked = me.public_strategy || false;
                if (me.has_discord_webhook) {
                    document.getElementById('input-discord').placeholder = 'Configured. Enter a new URL to replace or leave blank to clear.';
                }
            } catch (_) {}
        }

        async function saveAll() {
            const settings = {
                public_profile: document.getElementById('chk-public-profile').checked,
                public_strategy: document.getElementById('chk-public-strategy').checked,
                discord_webhook_url: document.getElementById('input-discord').value.trim(),
            };

            // Save profile + discord settings
            await fetch('/api/user/settings', {
                method: 'POST', headers: authHeaders(),
                body: JSON.stringify(settings),
            });

            // Save Upbit keys if provided
            const ak = document.getElementById('input-access-key').value.trim();
            const sk = document.getElementById('input-secret-key').value.trim();
            if (ak && sk) {
                await fetch('/api/user/keys', {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify({ access_key: ak, secret_key: sk }),
                });
            }

            const msg = document.getElementById('saved-msg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        loadSettings();
    </script>
</body>
</html>
